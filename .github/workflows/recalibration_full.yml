name: Mega Recalibration Full

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mega-recalibration-full-main
  cancel-in-progress: false

jobs:
  recalibration-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run recalibration full pipeline
        run: |
          python -m core.backtest
          python -m core.optimize
          python -m core.monitor_performance
          python -m core.learning

      - name: Commit recalibration full artifacts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/model_history.jsonl \
            data/config_promotion_log.jsonl \
            data/learning_log.jsonl \
            out/backtest_report.json \
            out/optimization_report.json \
            out/recommended_strategy_config.json \
            out/config_promotion_decision.json \
            out/performance_monitor.json \
            out/recalibration_signal.json \
            out/learning_decision.json \
            out/next_strategy_config.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update recalibration full artifacts"
          git push origin HEAD:main
