name: Mega Optimize

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mega-optimize-main
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run optimization
        run: |
          python -m core.optimize

      - name: Commit optimization artifacts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add out/optimization_report.json out/recommended_strategy_config.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update optimization report"
          git push origin HEAD:main
