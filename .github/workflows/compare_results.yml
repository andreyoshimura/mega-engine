name: Compare Mega-Sena Results

on:
  workflow_run:
    workflows: ["Mega Daily Generate"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 3,5,0"

permissions:
  contents: write

jobs:
  compare:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Compare latest draw
        run: |
          python -m core.compare_results

      - name: Monitor performance
        run: |
          python -m core.monitor_performance

      - name: Commit results (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/performance_log.jsonl out/performance_monitor.json out/recalibration_signal.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: log Mega-Sena results"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
