name: Compare Mega-Sena Results

on:
  # Dispara automaticamente quando o generate terminar com sucesso
  workflow_run:
    workflows: ["Mega Daily Generate"]
    types: [completed]

  # Execução manual (fallback)
  workflow_dispatch:

   # Agendamento de fallback: 23:00 BRT nas quartas, sextas e domingos
  schedule:
    - cron: "0 2 * * 3,5,0"

permissions:
  contents: write

jobs:
  compare:
    runs-on: ubuntu-latest

    # Só executa se o generate foi sucesso
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Instala dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4) Executa comparação (rodando como módulo)
      - name: Compare latest draw
        run: |
          python -m core.compare_results

      # 5) Commit seguro
      - name: Commit results (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/performance_log.jsonl data/last_result.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: log Mega-Sena results"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
