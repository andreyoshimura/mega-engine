name: Generate Weekly Mega Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 0"

permissions:
  contents: write

jobs:
  generate-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check image prerequisites
        id: prereq
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          has_api_key=false
          has_games=false

          if [ -n "${OPENAI_API_KEY}" ]; then
            has_api_key=true
          fi

          if [ -f out/jogos_gerados.json ]; then
            has_games=true
          fi

          echo "has_api_key=${has_api_key}" >> "${GITHUB_OUTPUT}"
          echo "has_games=${has_games}" >> "${GITHUB_OUTPUT}"

          if [ "${has_api_key}" != "true" ] || [ "${has_games}" != "true" ]; then
            echo "Skipping image workflow: OPENAI_API_KEY or out/jogos_gerados.json missing."
          fi

      - name: Setup Python
        if: steps.prereq.outputs.has_api_key == 'true' && steps.prereq.outputs.has_games == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        if: steps.prereq.outputs.has_api_key == 'true' && steps.prereq.outputs.has_games == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Generate Mega weekly image
        if: steps.prereq.outputs.has_api_key == 'true' && steps.prereq.outputs.has_games == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m core.image_generator

      - name: Commit image (if changed)
        if: steps.prereq.outputs.has_api_key == 'true' && steps.prereq.outputs.has_games == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add out/images/*.png

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update weekly mega image"
          git push origin HEAD:main
