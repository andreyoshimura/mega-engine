name: Generate Weekly Mega Image

on:
  # Permite rodar manualmente pelo botão "Run workflow"
  workflow_dispatch:

  # Agenda semanal (domingo 09:00 UTC). Ajuste para seu horário.
  schedule:
    - cron: "0 9 * * 0"

permissions:
  # Necessário para fazer commit/push de arquivos gerados
  contents: write

jobs:
  generate-image:
    runs-on: ubuntu-latest

    steps:
      # 1) Baixa o repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Configura Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3) Instala dependências (SEM requirements.txt)
      #    - pillow -> fornece o módulo PIL
      #    - openai  -> SDK para gerar a imagem
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai pillow

      # 4) Gera a imagem semanal
      #    Atenção: OPENAI_API_KEY deve estar em Settings > Secrets and variables > Actions
      - name: Generate Mega weekly image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python core/image_generator.py

      # 5) Faz commit e push se algum arquivo mudou (ex: out/images/...)
      #    Importante: não falhar se não houver mudanças.
      - name: Commit image (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Mostra status para debug
          git status

          # Se não tiver mudanças, sai sem erro
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "chore: update weekly mega image"
          git push
