name: Mega Recalibration Lite

on:
  workflow_dispatch:
  schedule:
    # GitHub cron usa UTC.
    # 04:30 UTC = 01:30 em America/Sao_Paulo na segunda-feira local.
    - cron: "30 4 * * 1"

permissions:
  contents: write

concurrency:
  group: mega-recalibration-lite-main
  cancel-in-progress: false

jobs:
  recalibration-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # v5 ja roda em Node 24 e evita o warning de descontinuacao do Node 20.
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        # v6 ja roda em Node 24; GitHub-hosted runners atuais suportam essa versao.
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run recalibration lite pipeline
        run: |
          python -m core.monitor_performance
          python -m core.learning

      - name: Commit recalibration lite artifacts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/model_history.jsonl \
            data/learning_log.jsonl \
            out/performance_monitor.json \
            out/recalibration_signal.json \
            out/learning_decision.json \
            out/next_strategy_config.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update recalibration lite artifacts"
          git push origin HEAD:main
