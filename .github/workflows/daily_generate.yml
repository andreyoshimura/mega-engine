name: Mega Daily Generate

on:
  # 🔹 01:30 UTC - Terça, Quinta, Sábado
  schedule:
    - cron: "30 1 * * 2,4,6"

  # 🔹 Permite execução manual pelo botão
  workflow_dispatch:

permissions:
  # Necessário para commitar alterações (JSON, histórico, etc.)
  contents: write

concurrency:
  # Evita duas execuções simultâneas
  group: mega-daily-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      # ==========================================================
      # 1️⃣ Checkout do repositório
      # ==========================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para histórico completo

      # ==========================================================
      # 2️⃣ Setup Python
      # ==========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==========================================================
      # 3️⃣ Instala dependências
      # ==========================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      # ==========================================================
      # 4️⃣ Sincroniza com remoto (evita push rejected)
      # ==========================================================
      - name: Sync with remote
        run: |
          git pull --rebase origin main

      # ==========================================================
      # 5️⃣ Pipeline principal
      #    Executa como módulo (-m)
      #    Necessário para imports internos (core.*)
      # ==========================================================
      - name: Ingest + Features + Generate
        run: |
          python -m core.ingest_megasena
          python -m core.features_megasena
          python -m core.generator

      # ==========================================================
      # 6️⃣ Commit seguro (somente se houver alteração)
      # ==========================================================
      - name: Commit artifacts (safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          # Só commita se houver mudanças reais
          if ! git diff --cached --quiet; then
            git commit -m "chore: update mega artifacts"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
