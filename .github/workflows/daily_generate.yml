name: Mega Daily Generate

on:
  # Execução automática diária (UTC)
  schedule:
    - cron: "15 10 * * *"  # 07:15 Brasil (BRT)

  # Permite rodar manualmente
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mega-daily-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Instala dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      # 4) Executa pipeline completo
      # IMPORTANTE: rodando como módulo para evitar erro de import
      - name: Ingest + Features + Generate
        run: |
          python -m core.ingest_megasena
          python -m core.features_megasena
          python -m core.generator

      # 5) Commit seguro apenas se houver mudanças
      - name: Commit artifacts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "chore: update mega artifacts"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
